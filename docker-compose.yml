version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vector_store:/app/vector_store
      - ./backend/studio.db:/app/studio.db
    restart: unless-stopped

  # Frontend is served as static files by the backend
  # Open http://localhost:8000 to access the app
